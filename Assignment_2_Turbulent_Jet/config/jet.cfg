%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%
% SU2 Configuration - Axisymmetric Turbulent Jet      %
% GSoC 2026 Assignment 2 - Adhith Krishna             %
%                                                     %
% Reference: Fukushima et al. (2001) PIV/LIF          %
%            Boersma et al. (1998) DNS                %
%            Hussein et al. (1994) LDA                %
%                                                     %			
% Re = 2000, D = 2 (normalised), water                %
%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

% Solver
SOLVER= INC_RANS
KIND_TURB_MODEL= SST
RESTART_SOL= YES

% Axisymmetric
AXISYMMETRIC= YES

% =====================================================
% Fluid Properties
% =====================================================

% Incompressible flow properties
INC_DENSITY_MODEL= CONSTANT % incompressible
INC_ENERGY_EQUATION= NO % no heat transfer
INC_DENSITY_INIT= 1.0
INC_VELOCITY_INIT= ( 1.0, 0.0, 0.0 )

% Viscosity
VISCOSITY_MODEL= CONSTANT_VISCOSITY
MU_CONSTANT= 0.001 % to get an Re of 2000
REF_LENGTH= 2.0

% =====================================================
% Numerical Method
% =====================================================

NUM_METHOD_GRAD= GREEN_GAUSS
CFL_NUMBER= 10
CFL_ADAPT= YES
CFL_ADAPT_PARAM= ( 0.5, 1.2, 1.0, 50.0 )

% Linear solver
LINEAR_SOLVER= FGMRES
LINEAR_SOLVER_PREC= ILU
LINEAR_SOLVER_ERROR= 1E-8
LINEAR_SOLVER_ITER= 15

% Convective scheme
CONV_NUM_METHOD_FLOW= FDS
MUSCL_FLOW= NO
SLOPE_LIMITER_FLOW= VENKATAKRISHNAN

% Turbulence numerics
CONV_NUM_METHOD_TURB= SCALAR_UPWIND
MUSCL_TURB= NO

% =====================================================
% Convergence Control
% =====================================================

ITER= 500
CONV_FIELD= RMS_PRESSURE, RMS_TKE, RMS_DISSIPATION
CONV_RESIDUAL_MINVAL= -8
CONV_STARTITER= 100
CONV_CAUCHY_ELEMS= 100
CONV_CAUCHY_EPS= 1E-6

% =====================================================
% Boundary Conditions
% =====================================================

% Inlet - jet velocity
INC_INLET_TYPE= VELOCITY_INLET
MARKER_INLET_TURBULENT= ( jet_inlet, 0.05, 0.62 )
MARKER_INLET= ( jet_inlet, 0.0, 1.0, 1.0, 0.0, 0.0 )

% Outlet - pressure outlet
INC_OUTLET_TYPE= PRESSURE_OUTLET
MARKER_OUTLET= ( outlet, 0.0 )
MARKER_HEATFLUX= ( nozzle_plate, 0.0, top_wall, 0.0 )

% Axis
MARKER_SYM= ( axis )

% Farfield
MARKER_PLOTTING= ( jet_inlet, outlet )
MARKER_MONITORING= ( NONE )

% =====================================================
% SST Turbulence Model
% =====================================================

% Freestream turbulence
FREESTREAM_TURBULENCEINTENSITY= 0.001
SST_OPTIONS= NONE

% =====================================================
% Mesh and Output
% =====================================================

% Mesh
MESH_FILENAME= mesh/jet.su2
MESH_FORMAT= SU2

% Output
SOLUTION_FILENAME= results/restart.dat
RESTART_FILENAME= results/restart.dat
OUTPUT_FILES= (RESTART, PARAVIEW_ASCII)
VOLUME_OUTPUT= (PRIMITIVE, RESIDUAL)
OUTPUT_WRT_FREQ= 500
CONV_FILENAME= results/history
SCREEN_OUTPUT= (INNER_ITER, RMS_PRESSURE, RMS_TKE, RMS_DISSIPATION)
SCREEN_WRT_FREQ_INNER= 500
